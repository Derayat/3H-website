<!DOCTYPE html>
<html>
<head>
<title>3 Horizons</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:black;
  color:#00ff66;
  overflow-x:hidden;
}

/* SMOOTH BG */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background:linear-gradient(270deg,#000,#002b15,#000);
  background-size:600% 600%;
  animation:bg 12s infinite;
  z-index:-1;
}

@keyframes bg{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

/* ENTRY */
#entry{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  z-index:999;
  cursor:pointer;
}

#entry h1{
  font-size:60px;
  animation:glow 2s infinite;
}

@keyframes glow{
  0%,100%{text-shadow:0 0 10px #0f0}
  50%{text-shadow:0 0 30px #0f0}
}

#main{display:none}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img{
  width:140px;
  animation:float 3s infinite;
}

@keyframes float{
  50%{transform:translateY(-10px)}
}

h1{
  font-size:70px;
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 25px;
  border:2px solid #0f0;
  background:none;
  color:#0f0;
  cursor:pointer;
}

/* SECTIONS */
section{
  padding:100px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}

h2{font-size:40px}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  width:260px;
  padding:20px;
  background:#000;
  border:1px solid #033;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  box-shadow:0 0 20px #0f0;
}

.desc{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:0.3s;
}

.card.active .desc{
  max-height:100px;
  opacity:1;
}

/* CTA */
.cta{
  font-size:26px;
  padding:120px;
}

</style>
</head>

<body>

<div id="entry">
  <h1>3 HORIZONS</h1>
  <p>Click to Enter</p>
</div>

<div id="main">

<div class="hero">
  <img src="./logo.png">
  <h1>3 HORIZONS</h1>
  <p>Dominate. Adapt. Conquer.</p>
  <button class="btn" onclick="join()">JOIN DISCORD</button>
</div>

<section>
<h2>ABOUT</h2>
<p>300+ members in few days.</p>
</section>

<section>
<h2>GAMES</h2>

<div class="cards">

<div class="card" onclick="toggle(this)">
<h3>VALORANT</h3>
<p class="desc">Tactical FPS.</p>
</div>

<div class="card" onclick="toggle(this)">
<h3>CS2</h3>
<p class="desc">Precision shooter.</p>
</div>

<div class="card" onclick="toggle(this)">
<h3>FORTNITE</h3>
<p class="desc">Build and fight.</p>
</div>

</div>

</section>

<section>
<h2>FOUNDERS</h2>

<div class="cards">

<div class="card" onclick="toggle(this)">
<h3>3H D3r4y4t</h3>
<p class="desc">Leader</p>
</div>

<div class="card" onclick="toggle(this)">
<h3>3H FSO</h3>
<p class="desc">Core</p>
</div>

<div class="card" onclick="toggle(this)">
<h3>3H mizzu</h3>
<p class="desc">Aggression</p>
</div>

</div>

</section>

<section class="cta">
YOU PLAY? PLAY GOOD. JOIN 3H NOW!
</section>

</div>

<script>
document.getElementById("entry").onclick=()=>{
  document.getElementById("entry").style.display="none";
  document.getElementById("main").style.display="block";
}

function join(){
  window.open("https://discord.gg/qRxKTtVQz5");
}

function toggle(el){
  el.classList.toggle("active");
}

const sections=document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
  sections.forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight-100){
      sec.style.opacity=1;
      sec.style.transform="translateY(0)";
    }
  });
});
</script>

</body>
</html>
